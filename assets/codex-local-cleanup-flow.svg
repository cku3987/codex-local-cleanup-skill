<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Codex Local Cleanup flow</title>
  <desc id="desc">Desktop Codex shows only active saved projects, mobile Codex before cleanup shows stale deleted project metadata too, and mobile Codex after cleanup shows only the active saved projects.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
    .panel-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; }
    .panel-note { font: 400 14px Arial, Helvetica, sans-serif; fill: #64748b; }
    .row-text { font: 600 14px Arial, Helvetica, sans-serif; fill: #1f2937; }
    .muted-text { font: 600 14px Arial, Helvetica, sans-serif; fill: #64748b; }
    .stale-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #991b1b; }
    .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
    .badge { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
    .skill-badge { font: 700 12px Arial, Helvetica, sans-serif; fill: #166534; }
    .skill-name { font: 700 19px Consolas, Menlo, monospace; fill: #0f172a; }
    .skill-step { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
  </style>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="58" y="62">Codex Local Cleanup</text>
  <text class="subtitle" x="58" y="94">Clean stale local .codex metadata when deleted desktop projects still appear on mobile.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="135" width="250" height="410" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
    <rect x="54" y="135" width="250" height="70" rx="18" fill="#e0f2fe"/>
    <path d="M54 187 H304 V205 H54 Z" fill="#e0f2fe"/>
    <text class="panel-title" x="78" y="177">Desktop Codex</text>
    <rect x="78" y="222" width="112" height="26" rx="13" fill="#0284c7"/>
    <text class="badge" x="96" y="240">9 active</text>
    <text class="panel-note" x="78" y="270">Saved projects only</text>

    <g>
      <rect x="78" y="292" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="309">Project Alpha</text>
      <rect x="78" y="322" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="339">Project Beta</text>
      <rect x="78" y="352" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="369">Project Gamma</text>
      <rect x="78" y="382" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="399">Project Delta</text>
      <rect x="78" y="412" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="429">Project Epsilon</text>
      <rect x="78" y="442" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="row-text" x="92" y="459">Project Zeta</text>
      <rect x="78" y="472" width="202" height="24" rx="7" fill="#f1f5f9"/>
      <text class="muted-text" x="92" y="489">More active projects...</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="352" y="135" width="275" height="410" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
    <rect x="352" y="135" width="275" height="70" rx="18" fill="#ffedd5"/>
    <path d="M352 187 H627 V205 H352 Z" fill="#ffedd5"/>
    <text class="panel-title" x="376" y="177">Mobile Codex</text>
    <text class="panel-note" x="376" y="199">Before cleanup</text>
    <rect x="376" y="222" width="112" height="26" rx="13" fill="#ea580c"/>
    <text class="badge" x="396" y="240">13 visible</text>
    <text class="panel-note" x="376" y="270">Active + stale metadata</text>

    <rect x="376" y="292" width="224" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="390" y="309">Project Alpha</text>
    <rect x="376" y="322" width="224" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="390" y="339">Project Beta</text>
    <rect x="376" y="352" width="224" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="390" y="369">Project Gamma</text>
    <rect x="376" y="382" width="224" height="24" rx="7" fill="#f1f5f9"/>
    <text class="muted-text" x="390" y="399">...active projects...</text>

    <rect x="376" y="422" width="224" height="28" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text class="stale-text" x="390" y="441">Deleted Project</text>
    <rect x="376" y="456" width="224" height="28" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text class="stale-text" x="390" y="475">Old Workspace</text>
    <rect x="376" y="490" width="224" height="28" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text class="stale-text" x="390" y="509">Removed Repo</text>
  </g>

  <g>
    <path d="M315 340 H342" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M638 340 H679" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M846 340 H879" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="678" y="176" width="180" height="328" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
    <rect x="704" y="205" width="128" height="32" rx="16" fill="#dcfce7"/>
    <text class="skill-badge" x="726" y="226">skill run</text>
    <text class="skill-name" x="702" y="272">$codex-</text>
    <text class="skill-name" x="702" y="296">local-</text>
    <text class="skill-name" x="702" y="320">cleanup</text>
    <line x1="704" y1="346" x2="832" y2="346" stroke="#dbe4ee" stroke-width="2"/>

    <circle cx="714" cy="376" r="6" fill="#16a34a"/>
    <text class="skill-step" x="730" y="381">Back up first</text>
    <circle cx="714" cy="411" r="6" fill="#2563eb"/>
    <text class="skill-step" x="730" y="416">Remove stale</text>
    <circle cx="714" cy="446" r="6" fill="#7c3aed"/>
    <text class="skill-step" x="730" y="451">Verify state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="896" y="135" width="250" height="410" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
    <rect x="896" y="135" width="250" height="70" rx="18" fill="#dcfce7"/>
    <path d="M896 187 H1146 V205 H896 Z" fill="#dcfce7"/>
    <text class="panel-title" x="920" y="177">Mobile Codex</text>
    <text class="panel-note" x="920" y="199">After cleanup</text>
    <rect x="920" y="222" width="112" height="26" rx="13" fill="#16a34a"/>
    <text class="badge" x="938" y="240">9 active</text>
    <text class="panel-note" x="920" y="270">Matches desktop list</text>

    <rect x="920" y="292" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="309">Project Alpha</text>
    <rect x="920" y="322" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="339">Project Beta</text>
    <rect x="920" y="352" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="369">Project Gamma</text>
    <rect x="920" y="382" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="399">Project Delta</text>
    <rect x="920" y="412" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="429">Project Epsilon</text>
    <rect x="920" y="442" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="row-text" x="934" y="459">Project Zeta</text>
    <rect x="920" y="472" width="202" height="24" rx="7" fill="#f1f5f9"/>
    <text class="muted-text" x="934" y="489">More active projects...</text>
  </g>

  <text class="small" x="58" y="586">The skill targets local Codex Desktop metadata, not source project files. It backs up before cleanup and preserves saved projects, projectless chats, and the current thread by default.</text>
</svg>
